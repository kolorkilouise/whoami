<div class="relative inline-block text-left">
  <button
    type="button"
    class="flex items-center gap-2 px-4 py-2 rounded-full bg-slate-800/40 hover:bg-slate-800/60 border border-slate-700/50 hover:border-indigo-500/50 transition-all text-slate-300 hover:text-white text-sm backdrop-blur-md shadow-lg"
    id="language-menu-button"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="true"
    (click)="toggle()"
  >
    <ng-icon name="bootstrapTranslate" class="text-indigo-400 text-lg"></ng-icon>
    <span class="font-medium uppercase tracking-wider text-xs">{{
      currentLangId.split('-')[0]
    }}</span>
    <ng-icon
      name="bootstrapChevronDown"
      class="text-slate-500 transition-transform duration-300"
      [class.rotate-180]="isOpen()"
    ></ng-icon>
  </button>

  @if (isOpen()) {
    <div
      class="absolute right-0 mt-3 w-48 rounded-2xl bg-slate-900/95 border border-slate-800 shadow-2xl backdrop-blur-xl p-2 z-50 ring-1 ring-white/10 transition-all duration-200 ease-out opacity-100 scale-100 translate-y-0 starting:opacity-0 starting:scale-95 starting:-translate-y-2"
      role="menu"
      aria-orientation="vertical"
      aria-labelledby="language-menu-button"
      tabindex="-1"
    >
      <div
        class="px-3 py-2 mb-1 text-[10px] font-bold text-slate-500 uppercase tracking-widest"
        i18n
      >
        Choose Language
      </div>

      <div class="space-y-1">
        @for (lang of languages; track lang.code) {
          <button
            class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm transition-all duration-200 group relative overflow-hidden"
            [class.text-indigo-400]="isCurrent(lang.code)"
            [class.bg-indigo-600/10]="isCurrent(lang.code)"
            [class.text-slate-300]="!isCurrent(lang.code)"
            [class.hover:bg-slate-800/80]="!isCurrent(lang.code)"
            [class.hover:text-white]="!isCurrent(lang.code)"
            role="menuitem"
            (click)="switchLanguage(lang.code)"
          >
            <div class="flex items-center gap-3 relative z-10">
              <span
                class="text-base grayscale group-hover:grayscale-0 transition-all duration-300"
                [class.grayscale-0]="isCurrent(lang.code)"
              >
                {{ lang.flag }}
              </span>
              <span class="font-medium">{{ lang.label }}</span>
            </div>

            @if (isCurrent(lang.code)) {
              <div
                class="w-1.5 h-1.5 rounded-full bg-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.8)] relative z-10"
              ></div>
            }
          </button>
        }
      </div>
    </div>

    <!-- Click outside to close -->
    <div class="fixed inset-0 z-40 bg-transparent" (click)="isOpen.set(false)"></div>
  }
</div>
